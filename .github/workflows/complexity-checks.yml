name: Complexity checks

on:
  workflow_run:
    workflows: ["Run Tests"]
    types: [completed]
jobs:
  complexity-checks:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Check code complexity with Complexipy
        uses: guzmanlopez/complexipy-action@feature/update-to-complexipy-v5
        with:
          paths: .
          max_complexity_allowed: 20
          output_json: true