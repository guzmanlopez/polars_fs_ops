# If you make changes to this file, you should run `uv run pre-commit install` to update the hooks
# Remember to update the version of the ruff-pre-commit repo when you update Ruff
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.0
    hooks:
      # Check uv.lock is up to date.
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit  
    rev: v0.14.10
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [ --fix, --line-length=100 ]
      # Run the formatter.
      - id: ruff-format
        args: [ --line-length=100 ]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ --maxkb=5120 ]
      - id: check-json
        types: [json]
        exclude: ^\.vscode/.*$ # Ignore .vscode folder which uses JSONC.
      - id: check-toml
        types: [toml]
      - id: check-yaml
        types: [yaml]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [ --baseline, .secrets.baseline ]
        exclude: >-
          (?x)^(
              \.env.*\.example|
              \.env.*\.sample
          )$
  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v4.2.0
    hooks:
      - id: complexipy
        args: [ --max-complexity-allowed=20 ]
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust code
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust code
        entry: cargo clippy --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
